name: Android APK

# Builds the React client into a native Android app (Capacitor) and publishes a
# debug APK to the "android" GitHub Release. Runs on demand or when the client
# changes. GitHub's Ubuntu runners ship with the Android SDK preinstalled.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "client/**"
      - ".github/workflows/android.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm install

      - name: Build web client (server URL baked in)
        working-directory: client
        run: npm run build
        env:
          # TLS via nginx/Let's Encrypt on the box; sslip.io maps the name to
          # 138.16.224.172 with no registration. :80 still serves old builds.
          VITE_API_URL: https://138-16-224-172.sslip.io

      - name: Add Android platform
        working-directory: client
        run: npx cap add android

      # Replaces the default Capacitor robot icon with the app icon (same image
      # as the desktop app) — reads client/assets/icon.png, writes launcher
      # icons + splash into the freshly added android/ project.
      - name: Generate launcher icons + splash from assets/icon.png
        working-directory: client
        run: >
          npx --yes @capacitor/assets generate --android
          --iconBackgroundColor '#313338' --iconBackgroundColorDark '#1e1f22'
          --splashBackgroundColor '#313338' --splashBackgroundColorDark '#1e1f22'
          --logoSplashScale 0.4

      # The push notification service is plain Java kept in client/android-extras
      # (the android/ project is generated fresh by `cap add` on every build).
      - name: Install push service sources
        run: cp client/android-extras/*.java client/android/app/src/main/java/com/concord/app/

      - name: Allow mic/camera/notification permissions + push service in the manifest
        run: |
          MANIFEST=client/android/app/src/main/AndroidManifest.xml
          sed -i '/android.permission.INTERNET/a\    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_DATA_SYNC" />\n    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />' "$MANIFEST"
          sed -i 's#</application>#    <service android:name=".PushService" android:exported="false" android:foregroundServiceType="dataSync" />\n        <receiver android:name=".BootReceiver" android:exported="true">\n            <intent-filter><action android:name="android.intent.action.BOOT_COMPLETED" /></intent-filter>\n        </receiver>\n    </application>#' "$MANIFEST"
          echo "--- permissions ---"; grep uses-permission "$MANIFEST"
          echo "--- service ---"; grep -A3 "PushService\|BootReceiver" "$MANIFEST"

      - name: Sync web assets into the Android project
        working-directory: client
        run: npx cap sync android

      # Without these two steps updates over an old install are impossible:
      # ephemeral runners generate a fresh debug key every build (signature
      # mismatch), and the generated project always says versionCode 1 (the
      # installer treats every APK as "already installed").
      # NB: the keystore is wired EXPLICITLY into build.gradle — dropping it
      # into ~/.android/debug.keystore silently didn't take (AGP looked
      # elsewhere and generated a random key; broke updates in 0.5.1–0.5.3).
      - name: Stable signing key (secret keystore, explicit signingConfig)
        run: |
          echo "${{ secrets.DEBUG_KEYSTORE_B64 }}" | base64 -d > client/android/app/concord-debug.keystore
          [ -s client/android/app/concord-debug.keystore ] || { echo "keystore secret is empty!"; exit 1; }
          GRADLE=client/android/app/build.gradle
          sed -i '/^android {/a\    signingConfigs {\n        debug {\n            storeFile file("concord-debug.keystore")\n            storePassword "android"\n            keyAlias "androiddebugkey"\n            keyPassword "android"\n        }\n    }' "$GRADLE"
          grep -A8 "signingConfigs" "$GRADLE" | head -10

      - name: Bake app version into the Android package
        run: |
          VERSION=$(node -p "require('./client/package.json').version")
          CODE=$(node -p "const [a,b,c]='$VERSION'.split('.').map(Number); a*1000000+b*10000+c")
          sed -i "s/versionCode 1/versionCode $CODE/" client/android/app/build.gradle
          sed -i "s/versionName \"1.0\"/versionName \"$VERSION\"/" client/android/app/build.gradle
          grep -E "versionCode|versionName" client/android/app/build.gradle

      - name: Point Gradle at the runner's Android SDK
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > client/android/local.properties

      - name: Build debug APK
        working-directory: client/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      # Publish-gate: the APK must be signed with OUR key, otherwise installed
      # phones can never update over it (signature mismatch). Fail loudly.
      - name: Verify APK signature is the stable Concord key
        run: |
          keytool -printcert -jarfile client/android/app/build/outputs/apk/debug/app-debug.apk | grep -E "Owner|SHA256:" | head -3
          keytool -printcert -jarfile client/android/app/build/outputs/apk/debug/app-debug.apk | grep -q "CN=Concord Debug" \
            || { echo "::error::APK signed with the WRONG key — publishing would break updates"; exit 1; }

      - name: Stage APK + update manifest
        run: |
          cp client/android/app/build/outputs/apk/debug/app-debug.apk ./concord-android.apk
          VERSION=$(node -p "require('./client/package.json').version")
          printf '{ "version": "%s", "url": "https://github.com/ZubaraX/concord/releases/download/android/concord-android.apk" }\n' "$VERSION" > android-latest.json
          echo "manifest: $(cat android-latest.json)"

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: concord-android-apk
          path: concord-android.apk

      - name: Publish to the "android" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android
          name: Concord for Android
          body: |
            Debug APK of the Concord Android app (Capacitor wrapper around the web client).
            Install on your phone (you may need to allow "install from unknown sources").
            The app checks this release on launch and offers an in-app update when a newer APK is published.
          files: |
            concord-android.apk
            android-latest.json
